<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Buscador de Wifi - Centros Educativos</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#1e293b">
  
  <!-- Soporte para iOS (Icono y barra de estado) -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="WifiCentros">
  <link rel="apple-touch-icon" href="wifi.png">
  
  <style>
    :root {
      --bg-color: #0f172a;
      --card-bg: #1e293b;
      --accent: #38bdf8;
      --text: #f8fafc;
      --text-muted: #94a3b8;
    }
    
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    body {
      background-color: var(--bg-color);
      color: var(--text);
      padding: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
    }

    header {
      text-align: center;
      margin-bottom: 25px;
      max-width: 500px;
      width: 100%;
    }

    header img {
      width: 80px;
      height: 80px;
      margin-bottom: 10px;
      border-radius: 16px;
      object-fit: cover;
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 5px;
    }

    p.subtitle {
      color: var(--text-muted);
      font-size: 0.9rem;
    }

    .search-container {
      width: 100%;
      max-width: 500px;
      margin-bottom: 20px;
      position: relative;
    }

    input[type="text"] {
      width: 100%;
      padding: 14px 16px;
      border-radius: 12px;
      border: 1px solid #334155;
      background-color: var(--card-bg);
      color: var(--text);
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s;
    }

    input[type="text"]:focus {
      border-color: var(--accent);
    }

    .results {
      width: 100%;
      max-width: 500px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .card {
      background-color: var(--card-bg);
      padding: 16px;
      border-radius: 12px;
      border: 1px solid #334155;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
    }

    .card-title {
      font-weight: 600;
      font-size: 1rem;
      margin-bottom: 8px;
      color: var(--accent);
    }

    .card-detail {
      font-size: 0.85rem;
      color: var(--text-muted);
      margin-bottom: 4px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .card-detail strong {
      color: var(--text);
    }

    .copy-btn {
      background-color: var(--accent);
      color: #0f172a;
      border: none;
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 0.75rem;
      font-weight: 600;
      cursor: pointer;
      margin-left: 8px;
      transition: opacity 0.2s;
    }

    .copy-btn:hover {
      opacity: 0.9;
    }

    .copy-btn.copied {
      background-color: #10b981;
      color: white;
    }

    /* Modal / Mensaje de Instalación */
    .install-modal {
      display: none;
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      width: 90%;
      max-width: 400px;
      background-color: #1e293b;
      border: 2px solid var(--accent);
      border-radius: 16px;
      padding: 20px;
      box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.5);
      z-index: 9999;
      animation: slideUp 0.4s ease-out;
    }

    @keyframes slideUp {
      from { transform: translate(-50%, 100%); opacity: 0; }
      to { transform: translate(-50%, 0); opacity: 1; }
    }

    .install-modal h3 {
      font-size: 1.1rem;
      margin-bottom: 10px;
      color: var(--accent);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .install-modal p {
      font-size: 0.9rem;
      color: var(--text-muted);
      line-height: 1.4;
      margin-bottom: 15px;
    }

    .install-btn-container {
      display: flex;
      gap: 10px;
      justify-content: flex-end;
    }

    .btn-close {
      background-color: #334155;
      color: var(--text);
      border: none;
      padding: 8px 16px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.85rem;
    }

    .btn-action {
      background-color: var(--accent);
      color: #0f172a;
      font-weight: 600;
      border: none;
      padding: 8px 16px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.85rem;
    }

    /* Indicador del número de registros cargados */
    .counter {
      font-size: 0.8rem;
      color: var(--text-muted);
      margin-top: -10px;
      margin-bottom: 15px;
    }
  </style>
</head>

    // --- 2. REGISTRO DEL SERVICE WORKER (offline) ---
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js')
          .then(reg => console.log('Service Worker registrado correctamente.', reg))
          .catch(err => console.error('Error al registrar Service Worker:', err));
      });
    }

    // --- 3. LÓGICA DEL BUSCADOR ---
    const searchInput = document.getElementById('searchInput');
    const resultsContainer = document.getElementById('resultsContainer');
    const recordCounter = document.getElementById('recordCounter');

    recordCounter.textContent = `Se han cargado ${db.length} centros educativos en memoria.`;

    function renderResults(list, term) {
      resultsContainer.innerHTML = '';
      
      // CAMBIO SOLICITADO: Si no se ha escrito nada, la pantalla principal queda totalmente vacía
      if (!term || term.length === 0) {
        resultsContainer.innerHTML = '<p style="text-align:center;color:var(--text-muted);font-size:0.9rem;">Escribe en el cuadro de arriba para encontrar un centro.</p>';
        return;
      }

      if (list.length === 0) {
        resultsContainer.innerHTML = '<p style="text-align:center;color:var(--text-muted);font-size:0.9rem;">No se encontraron centros que contengan ese texto.</p>';
        return;
      }
      
      list.forEach(item => {
        const card = document.createElement('div');
        card.className = 'card';
        card.innerHTML = `
          <div class="card-title">${item.centre}</div>
          <div class="card-detail"><span>Zona (ST):</span> <strong>${item.st}</strong></div>
          <div class="card-detail">
            <span>Usuario Wifi:</span> 
            <span>
              <strong>${item.usuari}</strong>
              <button class="copy-btn" onclick="copyText('${item.usuari}', this)">Copiar</button>
            </span>
          </div>
          <div class="card-detail">
            <span>Contraseña:</span> 
            <span>
              <strong style="color:var(--accent); font-family: monospace; font-size:1rem;">${item.contrasenya}</strong>
              <button class="copy-btn" onclick="copyText('${item.contrasenya}', this)">Copiar</button>
            </span>
          </div>
        `;
        resultsContainer.appendChild(card);
      });
    }

    // Función auxiliar para quitar tildes y facilitar la búsqueda de texto parcial
    function cleanText(str) {
      return str.toLowerCase()
        .replace(/[áàäâ]/g, 'a')
        .replace(/[éèëê]/g, 'e')
        .replace(/[íìïî]/g, 'i')
        .replace(/[óòöô]/g, 'o')
        .replace(/[úùüû]/g, 'u')
        .replace(/ç/g, 'c')
        .trim();
    }

    // Inicializar pantalla vacía por defecto
    renderResults([], "");

    searchInput.addEventListener('input', (e) => {
      const rawTerm = e.target.value;
      const term = cleanText(rawTerm);
      
      if (term === '') {
        renderResults([], "");
        return;
      }
      
      // Búsqueda parcial: busca si el término está incluido en cualquier parte del nombre, usuario o zona
      const filtered = db.filter(item => 
        cleanText(item.centre).includes(term) || 
        cleanText(item.usuari).includes(term) || 
        cleanText(item.st).includes(term)
      );
      
      // Mostramos un máximo de 30 resultados concurrentes para priorizar la fluidez en el móvil
      renderResults(filtered.slice(0, 30), rawTerm);
    });

    // Función nativa de copiado con fallback offline
    function copyText(text, btn) {
      if (!text) return;
      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(text).then(() => showCopied(btn), () => fallbackCopy(text, btn));
      } else {
        fallbackCopy(text, btn);
      }
    }

    function fallbackCopy(text, btn) {
      try {
        const textarea = document.createElement('textarea');
        textarea.value = text;
        textarea.style.position = 'fixed';
        document.body.appendChild(textarea);
        textarea.select();
        const success = document.execCommand('copy');
        document.body.removeChild(textarea);
        if (success) {
          showCopied(btn);
        } else {
          alert("Selecciona y copia manualmente.");
        }
      } catch (err) {
        alert("Error al copiar: " + err);
      }
    }

    function showCopied(btn) {
      const originalText = btn.textContent;
      btn.textContent = "¡Copiado!";
      btn.classList.add('copied');
      setTimeout(() => {
        btn.textContent = originalText;
        btn.classList.remove('copied');
      }, 1500);
    }

    // --- 4. DETECCIÓN AUTOMÁTICA DE SISTEMA OPERATIVO Y MENSAJE DE INSTALACIÓN ---
    let deferredPrompt;
    const installModal = document.getElementById('installModal');
    const installTitle = document.getElementById('installTitle');
    const installInstruction = document.getElementById('installInstruction');
    const btnInstallAction = document.getElementById('btnInstallAction');

    const isRunningStandalone = window.matchMedia('(display-mode: standalone)').matches 
                                 || window.navigator.standalone 
                                 || document.referrer.includes('android-app://');

    const userAgent = window.navigator.userAgent.toLowerCase();
    const isIos = /iphone|ipad|ipod/.test(userAgent);
    const isAndroid = /android/.test(userAgent);
    const isMobile = isIos || isAndroid;

    window.addEventListener('DOMContentLoaded', () => {
      if (isMobile && !isRunningStandalone) {
        setTimeout(() => {
          showInstallationBanner();
        }, 2000);
      }
    });

    function showInstallationBanner() {
      if (isIos) {
        installTitle.textContent = "Instalar en tu iPhone";
        installInstruction.innerHTML = "Para usar esta app sin internet:<br>1. Pulsa el botón de <strong>Compartir</strong> (icono ⎋ abajo en Safari).<br>2. Elige <strong>'Añadir a la pantalla de inicio'</strong>.";
        btnInstallAction.style.display = 'none';
        installModal.style.display = 'block';
      } else if (isAndroid) {
        window.addEventListener('beforeinstallprompt', (e) => {
          e.preventDefault();
          deferredPrompt = e;
          
          installTitle.textContent = "Instalar App en Android";
          installInstruction.textContent = "Instala el acceso directo en tu móvil para usar el buscador en cualquier momento sin datos ni internet.";
          btnInstallAction.style.display = 'block';
          btnInstallAction.textContent = "Instalar ahora";
          
          installModal.style.display = 'block';
        });
      }
    }

    btnInstallAction.addEventListener('click', async () => {
      if (deferredPrompt) {
        deferredPrompt.prompt();
        await deferredPrompt.userChoice;
        deferredPrompt = null;
        installModal.style.display = 'none';
      }
    });

    function closeInstallPrompt() {
      installModal.style.display = 'none';
    }
  </script>
